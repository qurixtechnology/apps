  <div class="md-toolbar qrx-card">
    <div class="md-toolbar-left">
      <input type="file" id="md-file-input"
             accept=".md,.markdown,.mdown,.mkd,.txt,text/markdown,text/plain" hidden>
      <button class="qrx-btn qrx-btn-primary" data-action="open-file"
              aria-label="Open Markdown file">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Open Markdown File
      </button>
      <button class="qrx-btn" data-action="paste" aria-label="Paste Markdown from clipboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <rect x="8" y="2" width="8" height="4" rx="1"/>
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        </svg>
        Paste
      </button>
      <button class="qrx-btn" data-action="load-sample">
        Load sample
      </button>
      <button class="qrx-btn qrx-btn-ghost" data-action="clear" hidden>
        Clear
      </button>
      <span class="md-filename" data-current-filename></span>
    </div>
    <div class="md-toolbar-right">
      <button class="qrx-btn" data-action="toggle-source" hidden
              aria-label="View and edit the Markdown source">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <polyline points="16 18 22 12 16 6"/>
          <polyline points="8 6 2 12 8 18"/>
        </svg>
        Edit source
      </button>
      <button class="qrx-btn" data-action="export-word" disabled
              aria-label="Export rendered document as a Word document">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M8 13l1.5 5 1.5-3.5L12.5 18 14 13"/>
        </svg>
        Export as Word
      </button>
      <button class="qrx-btn qrx-btn-accent" data-action="export-pdf" disabled
              aria-label="Export rendered document as PDF">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export as PDF
      </button>
    </div>
  </div>

  <div class="md-dropzone" id="md-dropzone">
    <div class="md-dropzone-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <p>Drop a Markdown file here, open one, or paste from the clipboard.</p>
    <div class="md-dropzone-actions">
      <button class="qrx-btn qrx-btn-primary" data-action="paste" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
          <rect x="8" y="2" width="8" height="4" rx="1"/>
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
        </svg>
        Paste from clipboard
      </button>
      <button class="qrx-btn" data-action="write-new" type="button">Write Markdown</button>
    </div>
    <p class="md-dropzone-hint">
      Supports <code>.md</code>, <code>.markdown</code>, <code>.mdown</code>,
      <code>.mkd</code>, <code>.txt</code>
    </p>
  </div>

  <div class="md-layout">
    <aside class="md-outline" id="md-outline" hidden aria-label="Document outline">
      <div class="md-outline-title">Outline</div>
      <nav class="md-outline-nav" id="md-outline-nav"></nav>
    </aside>

    <div class="md-editor" id="md-editor">
      <textarea id="md-source" class="md-source" spellcheck="false" wrap="soft"
                aria-label="Markdown source" placeholder="# Write or paste Markdown here…"></textarea>
    </div>

    <article class="md-paper qrx-card" id="md-output" hidden>
      <!-- Rendered markdown injected here -->
    </article>
  </div>

  <div class="md-toast" id="md-toast" role="status" aria-live="polite"></div>

  <!-- Fullscreen view for tables & diagrams -->
  <div class="md-fs" id="md-fs" hidden role="dialog" aria-modal="true" aria-label="Fullscreen view">
    <div class="md-fs-bar">
      <span class="md-fs-title" id="md-fs-title"></span>
      <div class="md-fs-actions">
        <button class="md-fs-btn" id="md-fs-zoomout" type="button" title="Zoom out" aria-label="Zoom out">−</button>
        <button class="md-fs-btn" id="md-fs-zoomreset" type="button" title="Reset zoom" aria-label="Reset zoom">100%</button>
        <button class="md-fs-btn" id="md-fs-zoomin" type="button" title="Zoom in" aria-label="Zoom in">+</button>
      </div>
      <button class="md-fs-close" id="md-fs-close" type="button" title="Close (Esc)" aria-label="Close fullscreen">✕</button>
    </div>
    <div class="md-fs-body" id="md-fs-body"></div>
  </div>
